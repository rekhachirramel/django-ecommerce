<!-- templates/store/checkout_success.html -->
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"> 
    <title>Order Success</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
<div class="container my-5">
    <div class="card shadow-sm border-success">
        <div class="card-body text-center">
            <h1 class="text-success mb-4">
                <i class="bi bi-check-circle-fill"></i> Thank You!
            </h1>
            <p class="fs-5">Your order has been placed successfully.</p>

            <div class="mt-4 text-start d-inline-block">
                <p><strong>Order ID:</strong> {{ order.id }}</p>
                <p><strong>Name:</strong> {{ order.name }}</p>
                <p><strong>Total Paid:</strong> ₹{{ order.total|floatformat:2 }}</p>
                {% if order.created_at %}
                    <p><strong>Order Date:</strong> {{ order.created_at|date:"F d, Y H:i A" }}</p>
                {% endif %}
            </div>

            <a href="{% url 'product_list' %}" class="btn btn-primary mt-4">Continue Shopping</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
